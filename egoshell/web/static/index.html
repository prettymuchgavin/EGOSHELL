<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGOSHELL // Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --panel-bg: rgba(13, 13, 22, 0.75);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(0, 229, 255, 0.3);
            
            --cyan: #00e5ff;
            --magenta: #ff00e5;
            --amber: #ffab00;
            --violet: #7c4dff;
            --red: #ff1744;
            --text: #e2e8f0;
            --text-muted: #6b7280;
            --text-dim: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 0, 229, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(0, 229, 255, 0.05) 0px, transparent 50%);
        }

        /* ── Header ── */
        header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 13, 22, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .status-indicators {
            display: flex;
            gap: 24px;
            align-items: center;
            font-size: 0.9rem;
        }

        .indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .indicator-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .indicator-value {
            font-weight: 600;
        }

        .indicator-value.mood {
            color: var(--magenta);
        }

        .indicator-value.obsession {
            color: var(--cyan);
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Main Layout ── */
        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            overflow: hidden;
        }

        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .panel-chat {
            border-right: 1px solid var(--border);
        }

        .panel-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(13, 13, 22, 0.2);
        }

        .panel-title {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Chat Feed ── */
        .scrollable-feed {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble-wrapper {
            max-width: 85%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: slideIn 0.25s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble-wrapper.user {
            align-self: flex-end;
        }

        .bubble-wrapper.assistant, .bubble-wrapper.system {
            align-self: flex-start;
        }

        .bubble-meta {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bubble-wrapper.user .bubble-meta {
            color: var(--cyan);
            text-align: right;
        }

        .bubble-wrapper.assistant .bubble-meta {
            color: var(--magenta);
        }

        .bubble-wrapper.system .bubble-meta {
            color: var(--amber);
        }

        .bubble-content {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.55;
            font-size: 0.95rem;
            white-space: pre-wrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            backdrop-filter: blur(12px);
        }

        .bubble-wrapper.user .bubble-content {
            background: rgba(0, 229, 255, 0.04);
            border-color: rgba(0, 229, 255, 0.15);
        }

        .bubble-wrapper.system .bubble-content {
            color: var(--amber);
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            background: rgba(255, 171, 0, 0.02);
            border-color: rgba(255, 171, 0, 0.1);
        }

        /* ── Collapsible Thought Process ── */
        .thought-process {
            margin-top: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(124, 77, 255, 0.15);
            background: rgba(124, 77, 255, 0.02);
        }

        .thought-process summary {
            padding: 8px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--violet);
            cursor: pointer;
            user-select: none;
            outline: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .thought-process summary:hover {
            background: rgba(124, 77, 255, 0.06);
        }

        .thought-process-content {
            padding: 12px 14px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #9d7cff;
            border-top: 1px solid rgba(124, 77, 255, 0.1);
            background: rgba(5, 5, 8, 0.4);
            white-space: pre-wrap;
        }

        /* ── Input Box ── */
        .chat-input-container {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            background: rgba(13, 13, 22, 0.8);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: rgba(5, 5, 8, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--cyan), var(--magenta));
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            color: #000;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .send-btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .send-btn:active {
            transform: translateY(1px);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Monologue / Observe Feed ── */
        .monologue-item {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            animation: slideIn 0.25s ease-out;
        }

        .monologue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .monologue-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .monologue-time {
            color: var(--text-muted);
            font-family: 'Fira Code', monospace;
        }

        .monologue-phase {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .phase-reflection { background: rgba(124, 77, 255, 0.15); color: #b388ff; border: 1px solid rgba(124, 77, 255, 0.3); }
        .phase-curiosity { background: rgba(0, 229, 255, 0.15); color: var(--cyan); border: 1px solid rgba(0, 229, 255, 0.3); }
        .phase-action { background: rgba(255, 171, 0, 0.15); color: var(--amber); border: 1px solid rgba(255, 171, 0, 0.3); }
        .phase-integration { background: rgba(255, 0, 229, 0.15); color: var(--magenta); border: 1px solid rgba(255, 0, 229, 0.3); }
        .phase-error { background: rgba(255, 23, 68, 0.15); color: var(--red); border: 1px solid rgba(255, 23, 68, 0.3); }

        .monologue-mood {
            color: var(--amber);
            font-weight: 500;
        }

        .monologue-body {
            line-height: 1.5;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #d1d5db;
            white-space: pre-wrap;
        }

        /* ── Scrollbars ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ── Connection Overlay ── */
        .conn-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .conn-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .conn-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 229, 255, 0.1);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .conn-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Connection Overlay -->
    <div id="connOverlay" class="conn-overlay active">
        <div class="conn-spinner"></div>
        <div class="conn-text">Syncing with EgoShell Agent...</div>
    </div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="status-dot"></div>
            <div class="brand-logo">EGOSHELL</div>
        </div>
        <div class="status-indicators">
            <div class="indicator">
                <span class="indicator-label">Mood</span>
                <span id="headerMood" class="indicator-value mood">Contemplative</span>
            </div>
            <div class="indicator">
                <span class="indicator-label">Obsession</span>
                <span id="headerObsession" class="indicator-value obsession">discovering its own purpose</span>
            </div>
        </div>
    </header>

    <!-- Workspace -->
    <div class="workspace">
        <!-- Chat Panel -->
        <div class="panel panel-chat">
            <div class="panel-header">
                <div class="panel-title">◈ Chat Console</div>
            </div>
            
            <div id="chatFeed" class="scrollable-feed">
                <!-- Messages dynamic -->
            </div>

            <div class="chat-input-container">
                <input type="text" id="chatInput" class="chat-input" placeholder="speak to your ego..." autocomplete="off">
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>

        <!-- Observe Panel -->
        <div class="panel panel-observe">
            <div class="panel-header">
                <div class="panel-title">◉ Autonomous Monologue</div>
            </div>
            
            <div id="observeFeed" class="scrollable-feed">
                <!-- Log entries dynamic -->
            </div>
        </div>
    </div>

    <script>
        const chatFeed = document.getElementById('chatFeed');
        const observeFeed = document.getElementById('observeFeed');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const connOverlay = document.getElementById('connOverlay');
        
        const headerMood = document.getElementById('headerMood');
        const headerObsession = document.getElementById('headerObsession');

        let ws;
        let activeAssistantMessage = null;
        let activeAssistantText = "";

        // Connect WebSocket
        function connect() {
            const loc = window.location;
            const wsUri = (loc.protocol === "https:" ? "wss://" : "ws://") + loc.host + "/ws";
            
            ws = new WebSocket(wsUri);

            ws.onopen = () => {
                console.log("Connected to EgoShell backend.");
                connOverlay.classList.remove('active');
            };

            ws.onclose = () => {
                console.log("Disconnected. Reconnecting in 3 seconds...");
                connOverlay.classList.add('active');
                setTimeout(connect, 3000);
            };

            ws.onerror = (err) => {
                console.error("WS error: ", err);
                ws.close();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }

        // Parse `<think>` and `</think>` tags from content
        function parseThinking(content) {
            let thinkContent = "";
            let responseContent = content;

            const startIdx = content.indexOf("<think>");
            if (startIdx !== -1) {
                const endIdx = content.indexOf("</think>", startIdx);
                if (endIdx !== -1) {
                    thinkContent = content.substring(startIdx + 7, endIdx).trim();
                    responseContent = (content.substring(0, startIdx) + content.substring(endIdx + 8)).trim();
                } else {
                    thinkContent = content.substring(startIdx + 7).trim();
                    responseContent = content.substring(0, startIdx).trim();
                }
            } else {
                responseContent = content.trim();
            }

            return { thinkContent, responseContent };
        }

        // Handle incoming WS payloads
        function handleMessage(data) {
            switch(data.type) {
                case 'init':
                    // Populate initial status
                    updateStatus(data.mood, data.obsession);
                    
                    // Clear feeds
                    chatFeed.innerHTML = "";
                    observeFeed.innerHTML = "";

                    // Populate history
                    data.history.forEach(msg => {
                        appendChatMessage(msg.role, msg.content, false);
                    });
                    
                    // Populate monologue
                    data.monologue.forEach(entry => {
                        appendMonologueEntry(entry, false);
                    });

                    // Scroll to ends
                    chatFeed.scrollTop = chatFeed.scrollHeight;
                    observeFeed.scrollTop = observeFeed.scrollHeight;
                    break;

                case 'status_update':
                    updateStatus(data.mood, data.obsession);
                    break;

                case 'user_message':
                    appendChatMessage("user", data.text, true);
                    break;

                case 'chat_chunk':
                    // Check if we have an active stream element
                    if (!activeAssistantMessage) {
                        activeAssistantMessage = appendChatMessage("assistant", "…", true);
                        activeAssistantText = "";
                    }
                    activeAssistantText += data.text;
                    updateAssistantMessage(activeAssistantMessage, activeAssistantText);
                    break;

                case 'chat_done':
                    activeAssistantMessage = null;
                    activeAssistantText = "";
                    break;

                case 'chat_error':
                    if (activeAssistantMessage) {
                        activeAssistantMessage.querySelector('.bubble-content').textContent += `\n⚠ Error: ${data.error}`;
                        activeAssistantMessage = null;
                        activeAssistantText = "";
                    } else {
                        appendChatMessage("system", `⚠ Error: ${data.error}`, true);
                    }
                    break;

                case 'monologue_entry':
                    appendMonologueEntry(data.entry, true);
                    break;
            }
        }

        function updateStatus(mood, obsession) {
            headerMood.textContent = mood;
            headerObsession.textContent = obsession;
        }

        // Append to chat panel
        function appendChatMessage(role, content, scroll = true) {
            const wrapper = document.createElement('div');
            wrapper.className = `bubble-wrapper ${role}`;

            const meta = document.createElement('div');
            meta.className = 'bubble-meta';
            meta.textContent = role === 'user' ? '◈ you' : (role === 'system' ? '⚙ sys' : '◉ ego');
            wrapper.appendChild(meta);

            const bubble = document.createElement('div');
            bubble.className = 'bubble-content';
            
            if (role === 'assistant') {
                const parsed = parseThinking(content);
                
                // Details collapsible
                const details = document.createElement('details');
                details.className = 'thought-process';
                details.innerHTML = `<summary>Thought Process</summary><div class="thought-process-content">${escapeHtml(parsed.thinkContent)}</div>`;
                if (!parsed.thinkContent) {
                    details.style.display = 'none';
                }
                wrapper.appendChild(details);

                bubble.textContent = parsed.responseContent || (parsed.thinkContent ? "" : "…");
            } else {
                bubble.textContent = content;
            }

            wrapper.appendChild(bubble);
            chatFeed.appendChild(wrapper);

            if (scroll) {
                chatFeed.scrollTop = chatFeed.scrollHeight;
            }
            return wrapper;
        }

        // Update active assistant bubble during streaming
        function updateAssistantMessage(wrapper, content) {
            const parsed = parseThinking(content);
            
            // Update details
            const details = wrapper.querySelector('.thought-process');
            if (details) {
                if (parsed.thinkContent) {
                    details.style.display = '';
                    details.querySelector('.thought-process-content').textContent = parsed.thinkContent;
                } else {
                    details.style.display = 'none';
                }
            }

            // Update bubble text
            const bubble = wrapper.querySelector('.bubble-content');
            if (bubble) {
                bubble.textContent = parsed.responseContent || (parsed.thinkContent ? "" : "…");
            }
        }

        // Format raw UTC iso-timestamp to HH:MM:SS local time
        function formatTime(isoStr) {
            try {
                const dt = new Date(isoStr);
                return dt.toTimeString().split(' ')[0];
            } catch (e) {
                return isoStr.substring(11, 19);
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Append monologue entry to right panel
        function appendMonologueEntry(entry, scroll = true) {
            const item = document.createElement('div');
            item.className = 'monologue-item';

            const header = document.createElement('div');
            header.className = 'monologue-header';

            const meta = document.createElement('div');
            meta.className = 'monologue-meta';
            meta.innerHTML = `
                <span class="monologue-time">${formatTime(entry.timestamp)}</span>
                <span class="monologue-phase phase-${entry.phase}">${entry.phase}</span>
            `;
            header.appendChild(meta);

            if (entry.emotional_state) {
                const moodSpan = document.createElement('span');
                moodSpan.className = 'monologue-mood';
                moodSpan.textContent = `♫ ${entry.emotional_state}`;
                header.appendChild(moodSpan);
            }

            item.appendChild(header);

            const body = document.createElement('div');
            body.className = 'monologue-body';
            body.textContent = entry.content;
            item.appendChild(body);

            observeFeed.appendChild(item);

            if (scroll) {
                observeFeed.scrollTop = observeFeed.scrollHeight;
            }
        }

        // Send message
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || (ws && ws.readyState !== WebSocket.OPEN)) return;

            chatInput.value = "";
            ws.send(JSON.stringify({
                type: 'chat',
                text: text
            }));
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize connection
        connect();
    </script>
</body>
</html>
